---
- name: "Unmount any active partitions on {{ current_drive }}"
  ansible.builtin.shell: "umount {{ current_drive }}* || true"
  changed_when: false

- name: "Zapping all signatures (LVM/ZFS/GPT) on {{ current_drive }}"
  ansible.builtin.command: "wipefs -a {{ current_drive }}"

- name: "Destroying partition tables and metadata on {{ current_drive }}"
  ansible.builtin.command: "sgdisk --zap-all {{ current_drive }}"
  register: sgdisk_result
  # sgdisk returns 2 if the disk is already completely blank, which is fine
  failed_when: sgdisk_result.rc not in [0, 2] 

- name: "Informing the OS of partition changes on {{ current_drive }}"
  ansible.builtin.command: "partprobe {{ current_drive }}"
  changed_when: false