---
- name: Install Python 3.9+
  import_playbook: bootstrap.yml

- name: Configure Oracle Linux System & Network (StorPool Demo Layout)
  hosts: oracle_nodes
  gather_facts: true
#  serial: 1

  tasks:

    # 1. Handle Hostname & Hosts File
    - name: Check current hostname
      ansible.builtin.setup:
        filter: ansible_hostname

    - name: Set fact if rename is required
      ansible.builtin.set_fact:
        perform_rename: "{{ ansible_hostname != inventory_hostname ~ '.' ~ dns_search_domain }}"

    - name: Set new Hostname (OS)
      ansible.builtin.hostname:
        name: "{{ inventory_hostname }}"#.{{ dns_search_domain }}"
      when: perform_rename

    - name: Update /etc/hosts
      ansible.builtin.lineinfile:
        path: /etc/hosts
        regexp: "^{{ ansible_default_ipv4.address }}"
        line: "{{ iface_mgmt_cidr }} {{ inventory_hostname }} {{ inventory_hostname }}.{{ dns_search_domain }}"
        state: present
      when: perform_rename

    # 2. Network Prerequisites
    - name: Ensure NetworkManager Python dependencies are installed
      ansible.builtin.command: dnf install -y NetworkManager-libnm
      register: dnf_nm
      changed_when: "'Nothing to do' not in dnf_nm.stdout"

- name: Clear StorPool storage drives
  hosts: oracle_nodes
  gather_facts: true

  tasks:
    - name: Ensure disk management tools are installed
      ansible.builtin.command: dnf install -y parted gdisk util-linux
      register: dnf_disk
      changed_when: "'Nothing to do' not in dnf_disk.stdout"

    - name: Map serial numbers to device paths
      ansible.builtin.set_fact:
        drives_to_wipe: >-
          {{
            ansible_facts.devices | dict2items
            | selectattr('value.serial', 'defined')
            | selectattr('value.serial', 'in', sp_nvme_serials)
            | map(attribute='key')
            | map('regex_replace', '^', '/dev/')
            | list
          }}

    - name: Debug matched drives
      ansible.builtin.debug:
        msg: "Found matches: {{ drives_to_wipe }}"

    - name: Process drives found
      ansible.builtin.include_tasks: inner_wipe.yml
      loop: "{{ drives_to_wipe }}"
      loop_control:
        loop_var: current_drive

- name: Set up iSCSI initiators
  hosts: oracle_nodes
  gather_facts: false # Facts aren't strictly needed for these specific tasks

  tasks:
    - name: Install iSCSI initiator utilities
      ansible.builtin.dnf:
        name: iscsi-initiator-utils
        state: present

    - name: Define dynamic initiator IQN
      ansible.builtin.copy:
        dest: /etc/iscsi/initiatorname.iscsi
        content: "InitiatorName=iqn.2011-11.com.storpool:{{ inventory_hostname.split('.') | first }}\n"
        mode: '0644'
      register: iqn_config

    - name: Enable and Restart iscsid service
      ansible.builtin.systemd:
        name: iscsid
        state: restarted
        enabled: true
      # Only restart the service if the IQN file was actually changed/created
      when: iqn_config.changed

- name: Install target Kernel
  hosts: oracle_nodes
  gather_facts: true

  tasks:
    - name: Fetch StorPool supported kernels JSON
      ansible.builtin.uri:
        url: https://vault.storpool.com/supported-kernels-release.json
        return_content: true
      register: sp_kernels_json
      delegate_to: localhost # Only fetch it once from the Ansible controller
      run_once: true

    - name: Dynamically determine the latest supported UEK kernel for the OS
      ansible.builtin.set_fact:
        pin_version: >-
          {{ 
             sp_kernels_json.json['ORACLE' ~ ansible_distribution_major_version]['nehalem'] 
             | dict2items 
             | map(attribute='value') 
             | flatten
             | select('search', 'uek') 
             | community.general.version_sort 
             | last 
          }}

    - name: Debug detected kernel
      ansible.builtin.debug:
        msg: "Dynamically selected target kernel: {{ pin_version }}"

    - name: Fail if no matching kernel was found
      ansible.builtin.fail:
        msg: "Could not find a supported kernel for Oracle Linux {{ ansible_distribution_major_version }} in the JSON!"
      when: pin_version | length == 0

    - name: Install the specific kernel version (Core, Modules, Devel, and Netfilter)
      ansible.builtin.command: >
        dnf install -y 
        kernel-uek-core-{{ pin_version }} 
        kernel-uek-modules-{{ pin_version }} 
        kernel-uek-devel-{{ pin_version }}
        kernel-uek-modules-extra-netfilter-{{ pin_version }}
      register: dnf_kernel
      changed_when: "'Nothing to do' not in dnf_kernel.stdout"

    - name: Find the exact vmlinuz path for the target kernel
      ansible.builtin.shell: "ls /boot/vmlinuz*{{ pin_version }}* | head -n 1"
      register: exact_kernel_path
      changed_when: false
      failed_when: exact_kernel_path.stdout == ""

    - name: Debug exact kernel path
      ansible.builtin.debug:
        msg: "Found kernel at: {{ exact_kernel_path.stdout }}"

    - name: Pin the kernel using grubby
      ansible.builtin.command:
        cmd: "grubby --set-default {{ exact_kernel_path.stdout }}"
        
    - name: Get current running kernel
      ansible.builtin.command: uname -r
      register: running_kernel
      changed_when: false

    - name: Reboot to apply new kernel
      ansible.builtin.reboot:
        msg: "Rebooting node to switch from {{ running_kernel.stdout }} to {{ pin_version }}"
        post_reboot_delay: 30
        reboot_timeout: 240
      when: running_kernel.stdout != pin_version

    - name: Find ALL other install-only kernel packages (older AND newer)
      ansible.builtin.shell: >
        rpm -qa | grep -iE '^kernel' | grep -ivE 'headers|tools' | grep -v "{{ pin_version }}" | grep -v "rescue"
      register: kernels_to_remove
      changed_when: false
      failed_when: false 

    - name: Explicitly remove all non-active kernels (Bypassing DNF dependencies)
      ansible.builtin.command:
        cmd: "rpm -e --nodeps {{ kernels_to_remove.stdout_lines | join(' ') }}"
      when: kernels_to_remove.stdout_lines | length > 0
      register: explicit_kernel_cleanup
      changed_when: explicit_kernel_cleanup.rc == 0

    - name: Find static rescue files in /boot
      ansible.builtin.find:
        paths: /boot
        patterns: "*rescue*"
      register: rescue_files

    - name: Remove static rescue kernel and initramfs files
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: absent
      loop: "{{ rescue_files.files }}"
      when: rescue_files.matched > 0
      # Provide clean output showing exactly what was deleted
      loop_control:
        label: "{{ item.path }}"

