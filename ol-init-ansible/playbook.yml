- name: Configure Network with NetworkManager
  hosts: oracle_nodes
  gather_facts: true
#  serial: 1

  tasks:
    # 0. CLEANUP: Delete default profiles that hijack the interfaces
    - name: Remove auto-generated default profiles hogging physical NICs
      community.general.nmcli:
        conn_name: "{{ item }}"
        state: absent
      loop: "{{ [iface_bond_primary, iface_bond_secondary, iface_mgmt_phys, iface_iscsi_primary, iface_iscsi_secondary ] }}"

    # 1. Configure conf Interface (SSH)
    - name: Configure conf Interface
      community.general.nmcli:
        conn_name: "{{ iface_conf }}"
        ifname: "{{ iface_conf }}"
        type: ethernet
        ip4: "{{ iface_conf_cidr }}"
        method4: manual
        never_default4: true
        method6: disabled
        state: present

    # 2.1. Configure mgmt Interface (561 untagged)
    - name: Configure mgmt Interface
      community.general.nmcli:
        conn_name: "{{ iface_mgmt_phys }}"
        ifname: "{{ iface_mgmt_phys }}"
        type: ethernet
        stp: false
        ip4: "{{ iface_mgmt_cidr }}/24"
        gw4: "{{ iface_mgmt_gw }}"
        dns4: "{{ dns_servers.split(' ') }}"
        dns4_search: "{{ dns_search_domain.split(' ') }}"
        method4: manual
        method6: disabled
        state: present

    # . Create iscsi VLAN 556
    - name: Create iSCSI VLAN 556 on iscsi1
      community.general.nmcli:
        conn_name: "{{iface_iscsi_primary}}.{{ vlan_iscsi1 }}"
        ifname: "{{ iface_iscsi_primary }}.{{ vlan_iscsi1 }}"
        type: vlan
        mtu: 9000
        vlanid: "{{ vlan_iscsi1 }}"
        vlandev: "{{iface_iscsi_primary}}"
        ip4: "{{ iscsi1_cidr }}"
        method4: manual
        method6: disabled
        state: present

    # . Create iscsi VLAN 557
    - name: Create iSCSI VLAN 557 on iscsi2
      community.general.nmcli:
        conn_name: "{{iface_iscsi_secondary}}.{{ vlan_iscsi2 }}"
        ifname: "{{iface_iscsi_secondary}}.{{ vlan_iscsi2 }}"
        type: vlan
        mtu: 9000
        vlanid: "{{ vlan_iscsi2 }}"
        vlandev: "{{iface_iscsi_secondary}}"
        ip4: "{{ iscsi2_cidr }}"
        method4: manual
        method6: disabled
        state: present

    # 4. Create Active-Backup Bond (bond0)
    - name: Create Active-Backup Bond (bond0)
      community.general.nmcli:
        conn_name: bond0
        ifname: bond0
        type: bond
        mtu: 9000
        mode: active-backup
        primary: "{{ iface_bond_primary }}"
        method4: disabled
        method6: disabled
        state: present

    # 4.5 Apply Advanced ARP Bonding Options
    - name: Set advanced ARP bonding options on bond0
      ansible.builtin.command: >
        nmcli con mod bond0 bond.options "mode=active-backup,arp_interval=500,arp_validate=active,arp_all_targets=any,arp_ip_target={{ groups['oracle_nodes'] | reject('equalto', inventory_hostname) | map('extract', hostvars, 'iface_vlan_special_cidr') | map('regex_replace', '/.*', '') | join(' ') }}"
      changed_when: false

    # 5. Attach Slaves to Bond
    - name: Add Slaves to Bond0
      community.general.nmcli:
        conn_name: "{{ item }}"
        ifname: "{{ item }}"
        type: ethernet
        mtu: 9000
        master: bond0
        slave_type: bond
        state: present
      loop: "{{ [iface_bond_primary, iface_bond_secondary] }}"

    # 6. Create VLAN 562
    - name: Create VLAN 562 on Bond0
      community.general.nmcli:
        conn_name: bond0.{{ vlan_sp }}
        ifname: bond0.{{ vlan_sp }}
        type: vlan
        vlanid: "{{ vlan_sp }}"
        vlandev: bond0
        stp: false
        ip4: "{{ iface_vlan_special_cidr }}"
        method4: manual
        method6: disabled
        zone: trusted
        state: present

    # 9. Apply the configuration
    - name: Reload NetworkManager to apply changes
      ansible.builtin.service:
        name: NetworkManager
        state: reloaded

    # 10. Ensure master connections activate and pull in their freed slaves
    - name: Bring up master connections
      ansible.builtin.command: "nmcli con up {{ item }}"
      loop:
        - bond0
        - bond0.{{ vlan_sp }}
        - "{{iface_mgmt_phys}}"
#        - ovirtmgmt
        - "{{iface_iscsi_primary}}.{{ vlan_iscsi1 }}"
        - "{{iface_iscsi_secondary}}.{{ vlan_iscsi2 }}"
      changed_when: true

    - name: Ensure firewalld package is installed
      ansible.builtin.dnf:
        name: firewalld
        state: present

    - name: Ensure firewalld is enabled and running
      ansible.builtin.systemd:
        name: firewalld
        state: started
        enabled: true

    - name: Prevent NetworkManager from automatically creating default connections
      ansible.builtin.copy:
        dest: /etc/NetworkManager/conf.d/90-no-auto-default.conf
        content: |
          [main]
          no-auto-default=*
        mode: '0644'

- name: Configure SSH
  hosts: oracle_nodes
  gather_facts: true

  tasks:
    - name: Add all inventory hosts to /etc/hosts
      ansible.builtin.blockinfile:
        path: /etc/hosts
        marker: "# {mark} ANSIBLE MANAGED BLOCK: CLUSTER NODES"
        block: |
          {% for host in groups['oracle_nodes'] %}
          {{ hostvars[host]['iface_mgmt_cidr'] }} {{ hostvars[host]['inventory_hostname'] }}.{{ dns_search_domain }} {{ hostvars[host]['inventory_hostname'] }}
          {% endfor %}

    - name: Generate SSH key for root (if missing)
      ansible.builtin.user:
        name: root
        generate_ssh_key: yes
        ssh_key_type: ed25519

    - name: Fetch all public keys from nodes
      ansible.builtin.fetch:
        src: /root/.ssh/id_ed25519.pub
        dest: "buffer/{{ inventory_hostname }}-id_ed25519.pub"
        flat: yes
      changed_when: false

    - name: Distribute keys to all other nodes
      ansible.posix.authorized_key:
        user: root
        key: "{{ lookup('file', 'buffer/' + item + '-id_ed25519.pub') }}"
        state: present
      loop: "{{ groups['oracle_nodes'] }}"
      when: item != inventory_hostname

    - name: Get SSH fingerprints from nodes
      ansible.builtin.command: "ssh-keyscan -H {{ hostvars[item]['iface_mgmt_cidr'] }}"
      register: remote_keys
      loop: "{{ groups['oracle_nodes'] }}"
      when: item != inventory_hostname
      changed_when: false
      retries: 6
      delay: 5
      until: remote_keys.rc == 0

    - name: Add fingerprints to known_hosts
      ansible.builtin.known_hosts:
        name: "{{ hostvars[item.item]['iface_mgmt_cidr'] }}"
        key: "{{ item.stdout }}"
        path: /root/.ssh/known_hosts
        state: present
      loop: "{{ remote_keys.results }}"
      when: item.skipped is not defined and item.stdout != ""
