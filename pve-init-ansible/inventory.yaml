all:
  children:
    proxmox:
      # --- Shared Variables for all nodes ---
      vars:
        ansible_user: root
        ansible_password: "XXXXXX" # Uncomment if not using SSH keys
        
        # Connection uses the Management IP found in 'ansible_host'
        pve_api_host: "{{ ansible_host }}"
        
        # Interface Names (Same across all identical hardware nodes)
        iface_bond_slaves: "enp129s0f0np0 enp129s0f1np1"
        iface_bond_primary: "enp129s0f0np0"
        
        # Gateways (Shared)
        iface_mgmt_gw: "10.1.2.254"
        
        # DNS (Shared)
        dns_servers: "1.0.0.1 8.8.8.8 10.1.2.254"
        dns_search_domain: "sof.lab"
        
        target_kernel_pkg: "proxmox-kernel-6.8.12-17-pve"
        pin_version: "6.8.12-17-pve"
        
        cluster_name: "demo3"
        cluster_network_addr: "10.1.2.1"

      # --- Specific Host Definitions ---
      hosts:
        sof-1:
          # The IP you currently SSH into (needed to run the playbook)
          ansible_host: 10.1.1.1
          
          # Physical Interfaces
          iface_conf: "eno1np0"
          iface_conf_cidr: "10.1.1.1/24"
          
          iface_mgmt_phys: "eno2np1"
          
          # Management Bridge
          iface_mgmt_cidr: "10.1.2.1"
          iface_mgmt_gw: "10.1.2.254"
          
          # VLANs
          iface_vlan_special_cidr: "10.1.2.1/24" # For bond0.562

          sp_nvme_serials:
            - "SN1234354"
            
        sof-2:
          # The IP you currently SSH into (needed to run the playbook)
          ansible_host: 10.1.1.2
          
          # Physical Interfaces
          iface_conf: "enp67s0f0"
          iface_conf_cidr: "10.1.1.2/24"
          
          iface_mgmt_phys: "enp67s0f1"
          
          # Management Bridge
          iface_mgmt_cidr: "10.1.2.2"
          iface_mgmt_gw: "10.1.2.254"
          
          # VLANs
          iface_vlan_special_cidr: "10.1.2.2/24" # For bond0.562

          sp_nvme_serials:
            - "SN1234354"
            

        sof-3:
          # The IP you currently SSH into (needed to run the playbook)
          ansible_host: 10.1.1.3
          
          # Physical Interfaces
          iface_conf: "enp67s0f0"
          iface_conf_cidr: "10.1.1.3/24"
          
          iface_mgmt_phys: "enp67s0f1"
          
          # Management Bridge
          iface_mgmt_cidr: "10.1.2.3"
          iface_mgmt_gw: "10.1.2.254"
          
          # VLANs
          iface_vlan_special_cidr: "10.1.2.3/24" # For bond0.562

          sp_nvme_serials:
            - "SN1234354"
