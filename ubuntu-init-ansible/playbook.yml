---
- name: Install Python 3 & Dependencies
  import_playbook: bootstrap.yml

- name: Configure Ubuntu System & Network (StorPool Demo Layout)
  hosts: ubuntu_nodes
  gather_facts: true

  tasks:
    # 1. Handle Hostname & Hosts File
    - name: Check current hostname
      ansible.builtin.setup:
        filter: ansible_hostname

    - name: Set fact if rename is required
      ansible.builtin.set_fact:
        perform_rename: "{{ ansible_hostname != inventory_hostname ~ '.' ~ dns_search_domain }}"

    - name: Set new Hostname (OS)
      ansible.builtin.hostname:
        name: "{{ inventory_hostname }}"
      when: perform_rename

    - name: Update /etc/hosts
      ansible.builtin.lineinfile:
        path: /etc/hosts
        regexp: "^{{ ansible_default_ipv4.address }}"
        line: "{{ iface_mgmt_cidr }} {{ inventory_hostname }} {{ inventory_hostname }}.{{ dns_search_domain }}"
        state: present
      when: perform_rename

    # 2. Network Prerequisites
    - name: Ensure NetworkManager is installed on Ubuntu
      ansible.builtin.apt:
        name: network-manager
        state: present
        update_cache: yes

- name: Clear StorPool storage drives
  hosts: ubuntu_nodes
  gather_facts: true

  tasks:
    - name: Ensure disk management tools are installed
      ansible.builtin.apt:
        name: 
          - parted
          - gdisk
          - util-linux
        state: present

    - name: Map serial numbers to device paths
      ansible.builtin.set_fact:
        drives_to_wipe: >-
          {{
            ansible_facts.devices | dict2items
            | selectattr('value.serial', 'defined')
            | selectattr('value.serial', 'in', sp_nvme_serials)
            | map(attribute='key')
            | map('regex_replace', '^', '/dev/')
            | list
          }}

    - name: Debug matched drives
      ansible.builtin.debug:
        msg: "Found matches: {{ drives_to_wipe }}"

    - name: Process drives found
      ansible.builtin.include_tasks: inner_wipe.yml
      loop: "{{ drives_to_wipe }}"
      loop_control:
        loop_var: current_drive

- name: Update Ubuntu Kernel
  hosts: ubuntu_nodes
  gather_facts: true

  tasks:
    - name: Fetch StorPool supported kernels JSON
      ansible.builtin.uri:
        url: https://vault.storpool.com/supported-kernels-release.json
        return_content: true
      register: sp_kernels_json
      delegate_to: localhost # Fetch only once from the Ansible controller
      run_once: true

    - name: Dynamically determine the latest supported Ubuntu kernel for the OS
      ansible.builtin.set_fact:
        # Assumes JSON key format is like UBUNTU2204 or UBUNTU2004
        pin_version: >-
          {{ 
             sp_kernels_json.json['UBUNTU' ~ (ansible_distribution_version | replace('.', ''))]['nehalem'] 
             | dict2items 
             | map(attribute='value') 
             | flatten
             | select('search', 'generic') 
             | community.general.version_sort 
             | last 
          }}

    - name: Debug detected kernel
      ansible.builtin.debug:
        msg: "Dynamically selected target kernel: {{ pin_version }}"

    - name: Fail if no matching kernel was found
      ansible.builtin.fail:
        msg: "Could not find a supported kernel for Ubuntu {{ ansible_distribution_version }} in the JSON!"
      when: pin_version | length == 0

    - name: Install the specific kernel version
      ansible.builtin.apt:
        name: 
          - "linux-image-{{ pin_version }}"
          - "linux-headers-{{ pin_version }}"
          - "linux-modules-extra-{{ pin_version }}"
        state: present
        update_cache: yes
      register: apt_kernel

    - name: Check if a reboot is required
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required_file

    - name: Get current running kernel
      ansible.builtin.command: uname -r
      register: running_kernel
      changed_when: false

    - name: Reboot to apply new kernel
      ansible.builtin.reboot:
        msg: "Rebooting node to switch from {{ running_kernel.stdout }} to {{ pin_version }}"
        post_reboot_delay: 30
        reboot_timeout: 240
      when: reboot_required_file.stat.exists and running_kernel.stdout != pin_version

    - name: Autoremove old unused kernels
      ansible.builtin.apt:
        autoremove: yes
        purge: yes

- name: Configure Network with NetworkManager
  hosts: ubuntu_nodes
  gather_facts: true

  tasks:
    - name: Delegate network management from Netplan to NetworkManager
      ansible.builtin.copy:
        dest: /etc/netplan/01-network-manager-all.yaml
        content: |
          network:
            version: 2
            renderer: NetworkManager
        mode: '0644'

    - name: Override Ubuntu Server default preventing NM from managing ethernet
      ansible.builtin.file:
        path: /etc/NetworkManager/conf.d/10-globally-managed-devices.conf
        state: touch
        mode: '0644'

    - name: Apply Netplan and restart NetworkManager (Expect Disconnect)
      ansible.builtin.shell: sleep 3; netplan apply && systemctl restart NetworkManager
      async: 60  # Let the task run in the background for up to 60 seconds
      poll: 0    # Fire and forget; do not wait for a response right now

    - name: Wait for network connection to restore
      ansible.builtin.wait_for_connection:
        delay: 10      # Wait 10 seconds before polling
        timeout: 120   # Give up if the node isn't back in 2 minutes

    - name: Ensure ifupdown interfaces are managed by NetworkManager
      ansible.builtin.lineinfile:
        path: /etc/NetworkManager/NetworkManager.conf
        regexp: '^managed='
        line: 'managed=true'
        insertafter: '^\[ifupdown\]'

    - name: Apply Netplan and restart NetworkManager
      ansible.builtin.shell: netplan apply && systemctl restart NetworkManager

    # 0. CLEANUP: Delete default profiles that hijack the interfaces
    - name: Remove auto-generated default profiles hogging physical NICs
      community.general.nmcli:
        conn_name: "{{ item }}"
        state: absent
      loop: "{{ [iface_bond_primary, iface_bond_secondary, iface_mgmt_phys] }}"

    # 1. Configure conf Interface (SSH)
    - name: Configure conf Interface
      community.general.nmcli:
        conn_name: "{{ iface_conf }}"
        ifname: "{{ iface_conf }}"
        type: ethernet
        ip4: "{{ iface_conf_cidr }}"
        method4: manual
        never_default4: true
        method6: disabled
        state: present

    # 2.1 Create cloudbr0 (Management Bridge)
    - name: Create management bridge (cloudbr0)
      community.general.nmcli:
        conn_name: cloudbr0
        ifname: cloudbr0
        type: bridge
        stp: false
        ip4: "{{ iface_mgmt_cidr }}/24"
        gw4: "{{ iface_mgmt_gw }}"
        dns4: "{{ dns_servers.split(' ') }}"
        dns4_search: "{{ dns_search_domain.split(' ') }}"
        method4: manual
        method6: disabled
        state: present

    # 2.2 Configure mgmt physical interface as slave to cloudbr0
    - name: Configure mgmt Interface as bridge slave
      community.general.nmcli:
        conn_name: "{{ iface_mgmt_phys }}"
        ifname: "{{ iface_mgmt_phys }}"
        type: ethernet
        master: cloudbr0
        slave_type: bridge
        state: present

    # 3. Create Active-Backup Bond (bond0)
    - name: Create Active-Backup Bond (bond0)
      community.general.nmcli:
        conn_name: bond0
        ifname: bond0
        type: bond
        mtu: 9000
        mode: active-backup
        primary: "{{ iface_bond_primary }}"
        method4: disabled
        method6: disabled
        state: present

    # 3.5 Apply Advanced ARP Bonding Options
    - name: Set advanced ARP bonding options on bond0
      ansible.builtin.command: >
        nmcli con mod bond0 bond.options "mode=active-backup,arp_interval=500,arp_validate=active,arp_all_targets=any,arp_ip_target={{ groups['ubuntu_nodes'] | reject('equalto', inventory_hostname) | map('extract', hostvars, 'iface_vlan_special_cidr') | map('regex_replace', '/.*', '') | join(' ') }}"
      changed_when: false

    # 4. Attach Slaves to Bond
    - name: Add Slaves to Bond0
      community.general.nmcli:
        conn_name: "{{ item }}"
        ifname: "{{ item }}"
        type: ethernet
        mtu: 9000
        master: bond0
        slave_type: bond
        state: present
      loop: "{{ [iface_bond_primary, iface_bond_secondary] }}"

    # 5. Create VLAN 562
    - name: Create VLAN 562 on Bond0
      community.general.nmcli:
        conn_name: bond0.{{ vlan_sp }}
        ifname: bond0.{{ vlan_sp }}
        type: vlan
        vlanid: "{{ vlan_sp }}"
        vlandev: bond0
        stp: false
        ip4: "{{ iface_vlan_special_cidr }}"
        method4: manual
        method6: disabled
        zone: trusted
        state: present

    # 6. Create cloudbr1 (User Bridge)
    - name: Create user bridge (cloudbr1)
      community.general.nmcli:
        conn_name: cloudbr1
        ifname: cloudbr1
        type: bridge
        mtu: 9000
        stp: false
        method4: disabled
        method6: disabled
        state: present

    # 7. Create VLAN 563 on Bond0 and attach to cloudbr1
    - name: Create VLAN 563 on Bond0
      community.general.nmcli:
        conn_name: bond0.{{ vlan_user }}
        ifname: bond0.{{ vlan_user }}
        type: vlan
        vlanid: "{{ vlan_user }}"
        vlandev: bond0
        mtu: 9000
        master: cloudbr1
        slave_type: bridge
        state: present

    # 8. Apply the configuration
    - name: Reload NetworkManager to apply changes
      ansible.builtin.service:
        name: NetworkManager
        state: reloaded

    # 9. Ensure master connections activate and pull in their freed slaves
    - name: Bring up master connections
      ansible.builtin.command: "nmcli con up {{ item }}"
      loop:
        - bond0
        - bond0.{{ vlan_sp }}
        - cloudbr0
        - cloudbr1
      changed_when: true

    - name: Ensure UFW firewall is installed
      ansible.builtin.apt:
        name: ufw
        state: present

    - name: Ensure UFW is enabled
      community.general.ufw:
        state: enabled
        policy: allow # Adjust default policy based on your security needs

    - name: Prevent NetworkManager from automatically creating default connections
      ansible.builtin.copy:
        dest: /etc/NetworkManager/conf.d/90-no-auto-default.conf
        content: |
          [main]
          no-auto-default=*
        mode: '0644'

- name: Configure SSH
  hosts: ubuntu_nodes
  gather_facts: true

  tasks:
    - name: Add all inventory hosts to /etc/hosts
      ansible.builtin.blockinfile:
        path: /etc/hosts
        marker: "# {mark} ANSIBLE MANAGED BLOCK: CLUSTER NODES"
        block: |
          {% for host in groups['ubuntu_nodes'] %}
          {{ hostvars[host]['iface_mgmt_cidr'] }} {{ hostvars[host]['inventory_hostname'] }}.{{ dns_search_domain }} {{ hostvars[host]['inventory_hostname'] }}
          {% endfor %}

    - name: Generate SSH key for root (if missing)
      ansible.builtin.user:
        name: root
        generate_ssh_key: yes
        ssh_key_type: ed25519

    - name: Fetch all public keys from nodes
      ansible.builtin.fetch:
        src: /root/.ssh/id_ed25519.pub
        dest: "buffer/{{ inventory_hostname }}-id_ed25519.pub"
        flat: yes
      changed_when: false

    - name: Distribute keys to all other nodes
      ansible.posix.authorized_key:
        user: root
        key: "{{ lookup('file', 'buffer/' + item + '-id_ed25519.pub') }}"
        state: present
      loop: "{{ groups['ubuntu_nodes'] }}"
      when: item != inventory_hostname

    - name: Get SSH fingerprints from nodes
      ansible.builtin.command: "ssh-keyscan -H {{ hostvars[item]['iface_mgmt_cidr'] }}"
      register: remote_keys
      loop: "{{ groups['ubuntu_nodes'] }}"
      when: item != inventory_hostname
      changed_when: false
      retries: 6
      delay: 5
      until: remote_keys.rc == 0

    - name: Add fingerprints to known_hosts
      ansible.builtin.known_hosts:
        name: "{{ hostvars[item.item]['iface_mgmt_cidr'] }}"
        key: "{{ item.stdout }}"
        path: /root/.ssh/known_hosts
        state: present
      loop: "{{ remote_keys.results }}"
      when: item.skipped is not defined and item.stdout != ""