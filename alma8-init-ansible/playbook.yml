---
- name: Initialize AlmaLinux 8
  hosts: alma8
  gather_facts: yes
  become: true
  vars:
    ansible_python_interpreter: /usr/bin/python3.8

  tasks:

    - name: Install StorPool dependencies via command (bypassing the DNF module)
      command: dnf install -y epel-release kernel-devel kernel-headers wget curl
      register: dnf_install
      changed_when: "'Nothing to do' not in dnf_install.stdout"

    - name: Update all system packages
      command: dnf update -y
      register: dnf_update
      changed_when: "'Nothing to do' not in dnf_update.stdout"

- name: Configure Alma8 Network (StorPool Demo Layout)
  hosts: alma8
  gather_facts: true
  serial: 1

  tasks:
    - name: Set Hostname
      ansible.builtin.hostname:
        name: "{{ inventory_hostname }}.{{ dns_search_domain }}"

    - name: Update /etc/hosts for Cluster Resolution
      ansible.builtin.blockinfile:
        path: /etc/hosts
        marker: "# {mark} ANSIBLE MANAGED BLOCK: CLUSTER NODES"
        block: |
          {% for host in groups['all'] %}
          {{ hostvars[host]['iface_mgmt_cidr'] }} {{ hostvars[host]['inventory_hostname'] }}.{{ dns_search_domain }} {{ hostvars[host]['inventory_hostname'] }}
          {% endfor %}

- name: 2. Clear StorPool Storage Drives
  hosts: alma8
  gather_facts: true
  tasks:

    - name: Ensure parted and wipefs are installed (Bypassing DNF module)
      command: dnf install -y parted util-linux
      register: dnf_parted
      changed_when: "'Nothing to do' not in dnf_parted.stdout"

    - name: Map serial numbers to device paths
      set_fact:
        drives_to_wipe: >-
          {{
            ansible_facts.devices | dict2items
            | selectattr('value.serial', 'defined')
            | selectattr('value.serial', 'in', sp_nvme_serials)
            | map(attribute='key')
            | map('regex_replace', '^', '/dev/')
            | list
          }}

    - name: Wipe Partition Tables on matched drives
      ansible.builtin.command: "wipefs -a {{ item }}"
      loop: "{{ drives_to_wipe }}"
      when: drives_to_wipe | length > 0

- name: Install target Kernel
  hosts: alma8
  gather_facts: true

  tasks:

    - name: Install specific kernel version (Bypassing DNF module)
      command: "dnf install -y kernel-{{ target_kernel_ver }} kernel-devel-{{ target_kernel_ver }} kernel-headers-{{ target_kernel_ver }}"
      register: dnf_kernel
      changed_when: "'Nothing to do' not in dnf_kernel.stdout"

    - name: Set Default Kernel with Grubby
      shell: |
        KERNEL_PATH=$(ls /boot/vmlinuz-* | grep "{{ target_kernel_ver }}" | head -n 1)
        grubby --set-default=$KERNEL_PATH
      register: grubby_result
      changed_when: grubby_result.rc == 0

    - name: Reboot to apply the new StorPool kernel
      ansible.builtin.reboot:
        msg: "Rebooting to load the new kernel"
        reboot_timeout: 300
      when: target_kernel_ver not in ansible_kernel

    - name: List old kernels
      ansible.builtin.shell: rpm -q kernel | grep -v "{{ target_kernel_ver }}"
      register: old_kernels
      failed_when: false
      changed_when: false

    - name: Remove old kernels (Optional - Bypassing DNF module)
      ansible.builtin.command: "dnf remove -y {{ old_kernels.stdout_lines | join(' ') }}"
      register: dnf_remove_kernels
      changed_when: "'Nothing to do' not in dnf_remove_kernels.stdout"
      when: old_kernels.stdout_lines | length > 0

- name: Configure Network
  hosts: alma8
  gather_facts: true
#  serial: 1

  tasks:
    - name: Ensure NetworkManager is running
      ansible.builtin.service:
        name: NetworkManager
        state: started
        enabled: yes

    - name: Remove auto-generated default profiles hogging physical NICs
      community.general.nmcli:
        conn_name: "{{ item }}"
        state: absent
      loop: "{{ iface_bond_slaves.split(' ') }}"

    - name: Configure conf Interface
      community.general.nmcli:
        conn_name: "{{ iface_conf }}"
        ifname: "{{ iface_conf }}"
        type: ethernet
        ip4: "{{ iface_conf_cidr }}"
        method4: manual
        never_default4: true
        state: present

    - name: Create Management Bridge (mgmt)
      community.general.nmcli:
        conn_name: mgmt
        ifname: mgmt
        type: bridge
        stp: false
        ip4: "{{ iface_mgmt_cidr }}/24"
        gw4: "{{ iface_mgmt_gw }}"
        dns4: "{{ dns_servers.split(' ') }}"
        dns4_search: "{{ dns_search_domain }}"
        method4: manual
        state: present

    - name: Configure mgmt Interface
      community.general.nmcli:
        conn_name: "{{ iface_mgmt_phys }}"
        ifname: "{{ iface_mgmt_phys }}"
        type: ethernet
        master: mgmt
        slave_type: bridge
        state: present

    - name: Create Active-Backup Bond (bond0)
      community.general.nmcli:
        conn_name: bond0
        ifname: bond0
        type: bond
        mtu: 9000
        mode: active-backup
        primary: "{{ iface_bond_primary }}"
        state: present

    - name: Set advanced ARP bonding options on bond0
      ansible.builtin.command: >
        nmcli con mod bond0 bond.options "mode=active-backup,arp_interval=500,arp_validate=active,arp_all_targets=any,arp_ip_target={{ groups['alma8'] | reject('equalto', inventory_hostname) | map('extract', hostvars, 'iface_vlan_special_cidr') | map('regex_replace', '/.*', '') | join(' ') }}"

      changed_when: false

    - name: Add Slaves to Bond0
      community.general.nmcli:
        conn_name: "{{ item }}"
        ifname: "{{ item }}"
        type: ethernet
        mtu: 9000
        master: bond0
        slave_type: bond
        state: present
      loop: "{{ iface_bond_slaves.split(' ') }}"

    - name: Create Storage VLAN (bond0.562)
      community.general.nmcli:
        conn_name: "bond0.{{ vlan_id_storage }}"
        ifname: "bond0.{{ vlan_id_storage }}"
        type: vlan
        vlandev: bond0
        vlanid: "{{ vlan_id_storage }}"
        ip4: "{{ iface_vlan_special_cidr }}"
        state: present

    - name: Create Bridge (vmbr0) for VM Traffic
      community.general.nmcli:
        conn_name: vmbr0
        ifname: vmbr0
        type: bridge
        state: present

    - name: Create Bridge VLAN Slave (bond0.563)
      community.general.nmcli:
        conn_name: "bond0.{{ vlan_id_bridge }}"
        ifname: "bond0.{{ vlan_id_bridge }}"
        type: vlan
        vlandev: bond0
        vlanid: "{{ vlan_id_bridge }}"
        master: vmbr0
        slave_type: bridge
        state: present

    - name: Reload NetworkManager to apply changes
      ansible.builtin.service:
        name: NetworkManager
        state: reloaded

    - name: Bring up master connections
      ansible.builtin.command: "nmcli con up {{ item }}"
      loop:
        - mgmt
        - bond0
        - bond0.562
        - bond0.563
        - vmbr0
      changed_when: true

    - name: Ensure Hostname is set
      ansible.builtin.hostname:
        name: "{{ inventory_hostname }}"

    - name: Add all inventory hosts to /etc/hosts
      ansible.builtin.blockinfile:
        path: /etc/hosts
        marker: "# {mark} ANSIBLE MANAGED BLOCK: CLUSTER NODES"
        block: |
          {% for host in groups['all'] %}
          {{ hostvars[host]['iface_mgmt_cidr'] }} {{ hostvars[host]['inventory_hostname'] }}.{{ dns_search_domain }} {{ hostvars[host]['inventory_hostname'] }}
          {% endfor %}

    - name: Generate SSH key for root (if missing)
      ansible.builtin.user:
        name: root
        generate_ssh_key: yes
        ssh_key_type: ed25519

    - name: Fetch all public keys from nodes
      ansible.builtin.fetch:
        src: /root/.ssh/id_ed25519.pub
        dest: "buffer/{{ inventory_hostname }}-id_ed25519.pub"
        flat: yes
      changed_when: false

    - name: Distribute keys to all other nodes
      ansible.posix.authorized_key:
        user: root
        key: "{{ lookup('file', 'buffer/' + item + '-id_ed25519.pub') }}"
        state: present
      loop: "{{ groups['alma8'] }}"
      when: item != inventory_hostname

    - name: Wait for SSH to become available on all nodes
      ansible.builtin.wait_for:
        host: "{{ hostvars[item]['iface_mgmt_cidr'] }}"
        port: 22
        state: started
        timeout: 300  # Will wait up to 5 minutes
      loop: "{{ groups['alma8'] }}"
      when: item != inventory_hostname

    - name: Get SSH fingerprints from nodes
      ansible.builtin.command: "ssh-keyscan -H {{ hostvars[item]['iface_mgmt_cidr'] }}"
      register: remote_keys
      loop: "{{ groups['alma8'] }}"
      when: item != inventory_hostname
      changed_when: false

    - name: Add fingerprints to known_hosts
      ansible.builtin.known_hosts:
        name: "{{ hostvars[item.item]['iface_mgmt_cidr'] }}"
        key: "{{ item.stdout }}"
        path: /root/.ssh/known_hosts
        state: present
      loop: "{{ remote_keys.results }}"
      when: item.skipped is not defined and item.stdout != ""
